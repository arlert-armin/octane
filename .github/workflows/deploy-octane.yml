name: Deploy Octane to Vercel

# Copy this into your OCTANE FORK at .github/workflows/deploy-octane.yml
# (it does not belong in the playground repo — Octane is a separate project).
#
# Required secrets in the Octane repo:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Required env in the Octane Vercel project (Production):
#   SECRET_KEY (fee-payer keypair JSON array), RPC_URL (mainnet)
# And commit your config.json (see config.mainnet.json) into the fork.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
